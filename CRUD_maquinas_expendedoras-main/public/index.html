<!DOCTYPE html>
<html>
<head>
  <title>Máquinas Expendedoras</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* Estilos mínimos para los botones si no tienes CSS propio */
    .btn-editar   { background: #f0a500; color: #fff; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; }
    .btn-eliminar { background: #e53935; color: #fff; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; }
    #btnCancelar  { background: #757575; color: #fff; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; display: none; margin-left: 8px; }
  </style>
</head>
<body>

<h1>Gestión de Máquinas Expendedoras</h1>

<form id="maquinaForm">
  <input type="text"   id="nombre"    placeholder="Nombre"    required>
  <input type="text"   id="ubicacion" placeholder="Ubicación" required>
  <input type="number" id="capacidad" placeholder="Capacidad" required>
  <input type="text"   id="estado"    placeholder="Estado"    required>
  <button type="submit">Agregar</button>
  <button type="button" id="btnCancelar">Cancelar</button>
</form>

<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Nombre</th>
      <th>Ubicación</th>
      <th>Capacidad</th>
      <th>Estado</th>
      <th>Acciones</th>
    </tr>
  </thead>
  <tbody id="tablaMaquinas"></tbody>
</table>

<script src="/js/script.js"></script>

</body>
</html>
